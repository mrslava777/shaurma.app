<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ — Шаурма на Левкова</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="admin-body">
    <header class="top-header admin-header">
        <a href="/" class="back-btn">← Назад</a>
        <div class="header-title">Админ-панель</div>
        <div style="width:60px;"></div>
    </header>

    <main class="main-content admin-main">
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-num" id="statTotal">0</div>
                <div class="stat-label">Заказов</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="statRevenue">0</div>
                <div class="stat-label">Выручка</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="statActive">0</div>
                <div class="stat-label">Активных</div>
            </div>
        </div>

        <h3 class="section-title">📦 Заказы</h3>
        <div id="adminOrders">
            <div class="loading">Загрузка...</div>
        </div>
    </main>

    <div class="toast" id="toast"></div>
    <script src="/static/js/admin.js"></script>
</body>
</html>
